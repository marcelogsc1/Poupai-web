<style>
:root{
  --bg:#fffbf7;--srf:#fff;--s2:#f8fafc;--s3:#f1f5f9;
  --bd:#e8ecf2;--bd2:#cbd5e1;
  --txt:#0d1117;--mt:#64748b;--mt2:#94a3b8;
  --grn:#22c55e;--grn-l:#f0fdf4;--grn-d:#16a34a;
  --blu:#2563eb;--blu-l:#eff6ff;--blu-d:#1d4ed8;
  --red:#ef4444;--red-l:#fef2f2;
  --amb:#f59e0b;--amb-l:#fffbeb;
  --pur:#8b5cf6;--pur-l:#f5f3ff;
  --accent:#38bdf8;
  --dk-bg:#ff9b5d;
  --dk-card:rgba(255,255,255,0.88);
  --dk-border:rgba(0,0,0,0.09);
  --dk-txt:#1a120a;
  --dk-muted:rgba(80,30,0,0.65);
  --dk-dim:rgba(80,30,0,0.50);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.04);
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--mt2); }

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Poppins,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
input,button,textarea{font-family:inherit}

/* Valores numéricos com a mesma família visual do app */
.value-font,
.tcsp,.tcmeta-inline,.tclim,.trest,.tcrem,.sv,.gra,.era,.pia,.tla,.prev-summary-val,
.bill-day,.bill-amt,.qepa,.itbl td.td-amt,.cfgi,
[style*="font-family:DM Mono"],[style*="font-family:'DM Mono'"],[style*="font-family:\\'DM Mono\\'"],[style*="font-family:monospace"],
[font-family*="DM Mono"],[font-family*="monospace"]{
  font-family:Poppins,system-ui,-apple-system,sans-serif!important;
  font-variant-numeric:tabular-nums;
  letter-spacing:-0.01em;
}
.import-area{font-family:monospace!important;letter-spacing:0}

@keyframes modalIn{from{opacity:0;transform:scale(0.96) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes slideUpSheet{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

#app{max-width:600px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}
.hdr{position:sticky;top:0;background:var(--dk-bg);border-bottom:1px solid var(--dk-border);z-index:100;box-shadow:0 2px 16px rgba(180,70,0,.20)}
.htop{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 0;position:relative}
.htop::after{content:'';position:absolute;top:0;left:0;right:0;height:80px;background:radial-gradient(ellipse at 50% 0%,rgba(56,189,248,.12) 0%,transparent 70%);pointer-events:none}
.atitle{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-muted)}
.htop-r{display:flex;align-items:center;gap:8px}
.bdg{font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px}
.cfg-btn{background:var(--dk-card);border:1px solid var(--dk-border);border-radius:7px;padding:4px 9px;cursor:pointer;font-size:12px;color:var(--dk-muted);transition:background 0.2s;display:flex;align-items:center;gap:4px}
.cfg-btn:hover{background:rgba(255,255,255,.1)}
.mnav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.mb{background:var(--dk-card);border:1px solid var(--dk-border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;color:var(--dk-muted);transition:all 0.2s}
.mb:hover{background:rgba(0,0,0,.08);color:var(--dk-txt)}
.mlbl{font-size:17px;font-weight:800;letter-spacing:-0.03em;color:var(--dk-txt)}

.tetos{
  display:flex;
  gap:10px;
  padding:0 16px 10px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.tetos::-webkit-scrollbar{display:none}
.tc{
  flex:0 0 200px;
  max-width:220px;
  max-height:80px;
  overflow:hidden;
  scroll-snap-align:start;
  background:var(--dk-card);
  border:1px solid var(--dk-border);
  border-radius:12px;
  padding:8px 13px 7px;
  transition:transform 0.15s;
  box-shadow:0 2px 10px rgba(120,60,0,0.12);
}
.tc:active{transform:scale(0.97);}
.tclbl{font-size:9px;font-weight:500;color:rgba(30,18,8,0.58);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tcrow{display:flex;align-items:baseline;gap:4px;margin-bottom:4px;min-width:0}
.tcsp{font-family:\'DM Mono\',monospace;font-size:12px;font-weight:400;flex:0 0 auto;line-height:1.2}
.tclim{font-family:\'DM Mono\',monospace;font-size:10px;color:var(--dk-dim)}
.tcmeta-inline{font-family:\'DM Mono\',monospace;font-size:9px;font-weight:500;color:var(--dk-dim);opacity:.78;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1 1 auto;line-height:1.1;letter-spacing:-.02em}
.tbar{height:4px;background:rgba(255,255,255,0.15);border-radius:99px;overflow:hidden}
.tfill{height:100%;border-radius:99px;transition:width .4s ease}
.trest{font-size:10px;font-family:\'DM Mono\',monospace;margin-top:3px;text-align:right}
.tcrem{font-family:\'DM Mono\',monospace;font-size:10px;color:var(--dk-dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}

.tabs{display:flex;border-top:1px solid var(--dk-border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:75px;padding:12px 4px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);border-bottom:2px solid transparent;letter-spacing:.04em;text-transform:uppercase;text-align:center;transition:all 0.2s;font-family:Poppins,sans-serif}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.on){color:rgba(26,18,10,0.65)}

@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ct{padding:16px 16px 90px;flex:1;width:100%;min-width:0;animation:fadeIn 0.18s ease-out}


.card{background:var(--srf);border:none;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);min-width:0;max-width:100%}

.sec-line{flex:1;height:1px;background:var(--bd);margin-left:8px}

/* Goal bars */
.goal-card{background:var(--srf);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow-sm)}
.goal-bar-bg{height:8px;background:var(--s3);border-radius:4px;overflow:hidden;margin-top:8px}
.goal-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease}

/* Due day badge */
.due-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:6px;background:#fef3c7;color:#92400e;display:inline-flex;align-items:center;gap:3px}
.due-badge.urgent{background:#fee2e2;color:#991b1b}
.due-badge.ok{background:#f0fdf4;color:#166534}

/* Section header with action button */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px}
.sec-hdr-lbl{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:6px}
.sec-hdr-btn{font-size:12px;font-weight:600;color:var(--blu);background:none;border:none;cursor:pointer;padding:0}

.tab-ico{display:block;font-size:14px;margin-bottom:2px}

.btn-export{background:var(--s2);color:var(--txt);border:1px solid var(--bd);padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background 0.2s}
.btn-export:hover{background:var(--bd)}

.bill-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd)}
.bill-row:last-child{border-bottom:none}

/* ===== Simulador de Parcelas ===== */
@keyframes simIn{from{opacity:0;transform:scale(0.93) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.sim-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:overlayFadeIn 0.18s ease}
.sim-modal{background:var(--srf);border-radius:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.22);animation:simIn 0.2s cubic-bezier(.22,.68,0,1.2)}
@media(max-width:600px){
  .sim-overlay{align-items:flex-end;padding:0}
  .sim-modal{border-radius:20px 20px 0 0;max-width:100%;max-height:88vh}
  .sim-modal::before{content:'';display:block;width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:12px auto 0}
}

/* ===== Onboarding ===== */
@keyframes obIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes obSlideLeft{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.ob-overlay{position:fixed;inset:0;background:rgba(15,23,42,.75);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;animation:overlayFadeIn 0.25s ease}
.ob-modal{background:var(--srf);border-radius:24px;width:100%;max-width:470px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.28);animation:obIn 0.28s cubic-bezier(.22,.68,0,1.2);position:relative}
.ob-step{padding:32px 30px 24px;display:none}
.ob-step.active{display:block;animation:obSlideLeft 0.22s ease}
.ob-icon{font-size:48px;margin-bottom:16px;display:block;text-align:center}
.ob-title{font-size:20px;font-weight:800;color:var(--txt);text-align:center;margin-bottom:8px;letter-spacing:-0.02em}
.ob-desc{font-size:14px;color:var(--mt);text-align:center;line-height:1.6;margin-bottom:20px}
.ob-steps-list{background:var(--s2);border-radius:12px;padding:14px 18px;margin:0 0 20px;width:100%;max-width:100%;overflow:visible}
.ob-steps-list li{font-size:13px;color:var(--txt);padding:6px 0;display:grid;grid-template-columns:22px minmax(0,1fr);gap:10px;align-items:flex-start;min-width:0;text-align:left}
.ob-steps-list li span:first-child{font-size:16px;line-height:1.5;text-align:center}.ob-steps-list li span:last-child{display:block;min-width:0;max-width:100%;white-space:normal;overflow-wrap:break-word;word-break:normal;line-height:1.5}
.ob-dots{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
.ob-dot{width:7px;height:7px;border-radius:50%;background:var(--bd2);transition:all 0.2s}
.ob-dot.on{width:20px;border-radius:4px;background:var(--blu)}

const KEY='gastos-v6';
function _storageKeyForUser(uid){ return uid ? KEY + ':' + uid : null; }
function _readUserLocalData(uid){
  var key = _storageKeyForUser(uid);
  if(!key) return null;
  try {
    var raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function _cacheUserLocalData(data, uid){
  var key = _storageKeyForUser(uid);
  if(!key || !data) return;
  try {
    var serialized = JSON.stringify(data);
    if(serialized.length < 2 * 1024 * 1024) localStorage.setItem(key, serialized);
  } catch(e) {}
}
function _clearLocalSessionData(uid){
  // Remove a chave sem uid (legada, versões antigas) e a chave com uid (atual)
  try { localStorage.removeItem(KEY); } catch(e) {}
  var key = _storageKeyForUser(uid);
  if(key) { try { localStorage.removeItem(key); } catch(e) {} }
}

        }
        // Sincroniza email/trial uma única vez por sessão, apenas quando dados vêm do servidor.
        // O estado local é atualizado antes da escrita para não renderizar uma tela sem trial e,
        // logo depois, outra com trial ativo — esse era o principal efeito visual de "piscar".
        if (!_fromCache && !_metadataSynced && user) {
          _metadataSynced = true;
          var _payload = {};
          if (!docData.email && user.email) _payload.email = user.email;
          if (!docData.trialStart) {
            _payload.trialStart = userTrialStart || new Date().toISOString();
            userTrialStart = _payload.trialStart;
          }
          if (docData.premium === undefined) {
            _payload.premium = false;
            userPremium = false;
          }
          if (Object.keys(_payload).length > 0) {
            setDoc(doc(db, "users", activeUid), _payload, { merge: true }).catch(function(){});
          }
        }
        renderFromSnapshot();
      } else {
        var googleIntent = getGoogleIntent();
        var signedWithGoogle = userHasProvider(user, 'google.com');
        if (signedWithGoogle && googleIntent !== 'signup') {
          pendingGoogleNoData = true;
          userId = null;
          isCloud = false;
          D = null;
          stopUserDataListener();
          render();
          return;
        }

        pendingGoogleNoData = false;
        clearGoogleIntent();
        D = _readUserLocalData(activeUid) || JSON.parse(JSON.stringify(INIT));
        _cacheUserLocalData(D, activeUid);
        var trialStart = new Date().toISOString();
        userTrialStart = trialStart;
        userPremium = false;
        setDoc(doc(db, "users", activeUid), { data: D, email: user.email, trialStart: trialStart, premium: false }).catch(function(){}); // fire-and-forget: criação de novo usuário
        renderFromSnapshot();
        // Novo usuário: mostra onboarding
        if (!D.onboarded) {
          setTimeout(function(){ window.openOnboarding && window.openOnboarding(); }, 400);
        }
      }
    }, function(err){
      if(activeUid !== userId) return;
      // Falhou ao escutar (sem cache, offline) — carrega somente o fallback isolado do usuário atual
      console.warn('onSnapshot error, usando localStorage isolado:', err.code||err);
      var localData = _readUserLocalData(activeUid);
      if(localData){ D = localData; renderFromSnapshot(); }
    }
  );
}

onAuthStateChanged(auth, (user) => {
  authChecked = true;
  if (user) {
    pendingGoogleNoData = false;
    if (!user.emailVerified) {
      pendingEmailVerification = true;
      var previousUid = userId;
      userId = null;
      isCloud = false;
      D = null;
      stopUserDataListener();
      _clearLocalSessionData(previousUid);
      render();
      return;
    }
    startUserDataListener(user);
  } else {
    pendingEmailVerification = false;
    pendingGoogleNoData = false;
    clearGoogleIntent();
    var previousUid = userId;
    userId = null;
    isCloud = false;
    D = null;
    stopUserDataListener();
    _clearLocalSessionData(previousUid);
    render();
  }
});

async function sset(v) {
  // Firestore é a fonte principal; o localStorage é apenas um fallback por usuário.
  // Isso evita vazamento/rollback entre contas diferentes no mesmo aparelho.
  var activeUid = userId;
  if(activeUid) _cacheUserLocalData(v, activeUid);
  if (isCloud && activeUid) {
    try { await setDoc(doc(db, "users", activeUid), { data: v }, { merge: true }); } catch(e) {}
  }
}
